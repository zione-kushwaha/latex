name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build (with dummy env vars)
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY:            dummy
          VITE_FIREBASE_AUTH_DOMAIN:        dummy.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID:         dummy
          VITE_FIREBASE_STORAGE_BUCKET:     dummy.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          VITE_FIREBASE_APP_ID:             "1:000000000000:web:dummy"
          VITE_BACKEND_URL:                 http://localhost:3001

  backend:
    name: Backend compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libfontconfig1-dev \
            libgraphite2-dev libharfbuzz-dev libicu-dev zlib1g-dev

      - run: cargo check --release
